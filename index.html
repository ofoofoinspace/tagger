<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>REF — Design Reference Tagger</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F8F7F4;
    --surface: #FFFFFF;
    --surface2: #F1EFE9;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text: #1A1A18;
    --text2: #6B6B67;
    --text3: #A8A8A4;
    --accent: #1A1A18;
    --mono: 'Courier New', Courier, monospace;
    --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1C1C1A;
      --surface2: #252523;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.2);
      --text: #EEEEE8;
      --text2: #999990;
      --text3: #555550;
      --accent: #EEEEE8;
    }
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* Layout */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 240px;
    min-width: 240px;
    border-right: 0.5px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 0.5px solid var(--border);
  }

  .logo {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 4px;
  }

  .logo-title {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .nav { flex: 1; overflow-y: auto; padding: 12px 0; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: color 0.1s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover { color: var(--text); }

  .nav-item.active {
    color: var(--text);
    font-weight: 500;
  }

  .nav-icon {
    width: 16px;
    height: 16px;
    opacity: 0.5;
    flex-shrink: 0;
  }

  .nav-item.active .nav-icon { opacity: 1; }

  .api-status {
    padding: 12px 20px;
    border-top: 0.5px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .api-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }

  .api-dot.ok { background: #4CAF50; }
  .api-dot.err { background: #E53935; }

  /* Main */
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  /* Views */
  .view { display: none; flex: 1; }
  .view.active { display: flex; flex-direction: column; }

  /* Tagger view */
  .tagger-layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    flex: 1;
    min-height: 0;
  }

  .image-zone {
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .drop-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.12s;
    position: relative;
    gap: 12px;
  }

  .drop-area:hover { background: var(--surface2); }
  .drop-area.drag-over { background: var(--surface2); }
  .drop-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  .drop-placeholder {
    text-align: center;
  }

  .drop-icon {
    width: 40px;
    height: 40px;
    border: 0.5px solid var(--border-strong);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    color: var(--text3);
    font-size: 20px;
  }

  .drop-placeholder p { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .drop-placeholder span { font-size: 11px; color: var(--text3); }

  .image-preview {
    display: none;
    flex: 1;
    flex-direction: column;
    min-height: 0;
  }

  .image-preview img {
    flex: 1;
    min-height: 0;
    object-fit: contain;
    display: block;
    width: 100%;
    background: var(--surface2);
  }

  .image-meta {
    padding: 10px 16px;
    font-size: 11px;
    color: var(--text3);
    border-top: 0.5px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .change-img-btn {
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
  }

  .change-img-btn:hover { color: var(--text2); }

  /* Result panel */
  .result-panel {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    background: var(--surface);
  }

  .panel-section {
    padding: 20px;
    border-bottom: 0.5px solid var(--border);
  }

  .panel-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
  }

  .analyze-btn {
    width: 100%;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    font-family: var(--sans);
    cursor: pointer;
    border-radius: 6px;
    border: 0.5px solid var(--border-strong);
    background: var(--text);
    color: var(--bg);
    transition: opacity 0.12s;
    letter-spacing: 0.02em;
  }

  .analyze-btn:hover { opacity: 0.85; }
  .analyze-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .loading {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
  }

  .spin {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--border);
    border-top-color: var(--text2);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading span { font-size: 12px; color: var(--text3); }

  /* Tags */
  .tags-wrap { display: flex; flex-direction: column; gap: 14px; }

  .tag-group-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }

  .tag-chips { display: flex; flex-wrap: wrap; gap: 5px; }

  .chip {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 4px;
    border: 0.5px solid var(--border);
    cursor: pointer;
    transition: all 0.1s;
    color: var(--text2);
    background: transparent;
    line-height: 1.6;
  }

  .chip:hover { border-color: var(--border-strong); color: var(--text); }

  /* Tag category colors */
  .chip.sel-typ { background: #EBF3FB; border-color: #90BDE8; color: #1A5C9A; }
  .chip.sel-fld { background: #EBF5E8; border-color: #8DC882; color: #2A6B20; }
  .chip.sel-atm { background: #F0EBFB; border-color: #B89EE0; color: #5A3A9A; }
  .chip.sel-mat { background: #FBF3E8; border-color: #E8C080; color: #8A5A10; }
  .chip.sel-elm { background: #FBECEB; border-color: #E89090; color: #9A2A20; }
  .chip.sel-sta { background: #F1EFE8; border-color: #B8B8A8; color: #4A4A40; }
  .chip.sel-auth { background: #FBEBF3; border-color: #E890B8; color: #9A205A; }

  @media (prefers-color-scheme: dark) {
    .chip.sel-typ { background: #0C2A44; border-color: #2A5A88; color: #7AAED8; }
    .chip.sel-fld { background: #0C2A10; border-color: #2A5A20; color: #70B860; }
    .chip.sel-atm { background: #1A0C38; border-color: #5A3A88; color: #B090D8; }
    .chip.sel-mat { background: #2A1A04; border-color: #6A4A10; color: #D8A040; }
    .chip.sel-elm { background: #2A0C0C; border-color: #6A2020; color: #D87070; }
    .chip.sel-sta { background: #1A1A14; border-color: #4A4A3A; color: #888870; }
    .chip.sel-auth { background: #280C18; border-color: #6A2048; color: #D070A0; }
  }

  /* Note */
  .note-ta {
    width: 100%;
    min-height: 90px;
    resize: vertical;
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }

  .note-ta:focus { outline: none; border-color: var(--border-strong); }
  .note-ta::placeholder { color: var(--text3); }

  .auth-row { display: flex; gap: 8px; margin-top: 8px; }

  .auth-input {
    flex: 1;
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    border-radius: 6px;
    border: 0.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
  }

  .auth-input:focus { outline: none; border-color: var(--border-strong); }
  .auth-input::placeholder { color: var(--text3); }

  /* Output */
  .output-box {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.7;
    padding: 12px;
    background: var(--surface2);
    border-radius: 6px;
    border: 0.5px solid var(--border);
    color: var(--text2);
    white-space: pre-wrap;
    word-break: break-all;
    margin-bottom: 10px;
  }

  .row-btns { display: flex; gap: 8px; }

  .btn-sm {
    flex: 1;
    padding: 8px 12px;
    font-size: 12px;
    font-family: var(--sans);
    cursor: pointer;
    border-radius: 6px;
    border: 0.5px solid var(--border-strong);
    background: transparent;
    color: var(--text2);
    transition: all 0.1s;
  }

  .btn-sm:hover { background: var(--surface2); color: var(--text); }

  /* ─── Settings view ─── */
  .settings-wrap { max-width: 640px; margin: 0 auto; padding: 40px 24px; width: 100%; }

  .settings-section { margin-bottom: 36px; }

  .settings-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 0.5px solid var(--border);
  }

  .api-key-row { display: flex; gap: 8px; }

  .api-key-input {
    flex: 1;
    font-family: var(--mono);
    font-size: 12px;
    padding: 9px 12px;
    border-radius: 6px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
  }

  .api-key-input:focus { outline: none; border-color: var(--border-strong); }

  .btn-primary {
    padding: 9px 16px;
    font-size: 12px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    border: none;
    background: var(--text);
    color: var(--bg);
    transition: opacity 0.1s;
  }

  .btn-primary:hover { opacity: 0.8; }

  /* Tag editor */
  .category-block {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface2);
  }

  .cat-key {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    background: var(--surface);
    padding: 2px 8px;
    border-radius: 4px;
    border: 0.5px solid var(--border);
  }

  .cat-label-input {
    flex: 1;
    font-size: 13px;
    font-family: var(--sans);
    border: none;
    background: transparent;
    color: var(--text);
    outline: none;
  }

  .cat-label-input::placeholder { color: var(--text3); }

  .del-cat-btn {
    font-size: 16px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    line-height: 1;
    padding: 0 2px;
  }

  .del-cat-btn:hover { color: #E53935; }

  .category-tags { padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

  .tag-pill {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 0.5px solid var(--border);
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tag-pill .del-tag {
    font-size: 13px;
    color: var(--text3);
    cursor: pointer;
    line-height: 1;
    background: none;
    border: none;
    padding: 0;
  }

  .tag-pill .del-tag:hover { color: #E53935; }

  .add-tag-mini {
    display: flex;
    gap: 5px;
    margin-top: 8px;
    width: 100%;
  }

  .mini-input {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    border: 0.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    width: 140px;
  }

  .mini-input:focus { outline: none; border-color: var(--border-strong); }

  .mini-hint { font-size: 11px; color: var(--text3); padding: 4px 0; }

  .btn-mini {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--sans);
  }

  .btn-mini:hover { background: var(--surface2); }

  .add-cat-row { display: flex; gap: 8px; margin-top: 8px; }

  .notice {
    font-size: 12px;
    color: var(--text3);
    background: var(--surface2);
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }

  /* Responsive */
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .tagger-layout { grid-template-columns: 1fr; }
    .result-panel { max-height: 60vh; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Studio</div>
      <div class="logo-title">Ref Tagger</div>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-view="tagger">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/>
          <rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/>
        </svg>
        이미지 분석
      </button>
      <button class="nav-item" data-view="settings">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
        </svg>
        설정 / 태그 편집
      </button>
    </nav>
    <div class="api-status">
      <div class="api-dot" id="apiDot"></div>
      <span id="apiStatusText">API 키 미설정</span>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Tagger View -->
    <div class="view active" id="view-tagger">
      <div class="tagger-layout">

        <!-- Image zone -->
        <div class="image-zone">
          <div class="drop-area" id="dropArea">
            <input type="file" accept="image/*" id="fileInput" />
            <div class="drop-placeholder">
              <div class="drop-icon">+</div>
              <p>이미지 드래그 또는 클릭</p>
              <span>PNG · JPG · WEBP · GIF</span>
            </div>
          </div>
          <div class="image-preview" id="imagePreview">
            <img id="previewImg" src="" alt="" />
            <div class="image-meta">
              <span id="imgMetaText"></span>
              <button class="change-img-btn" id="changeImgBtn">다른 이미지 →</button>
            </div>
          </div>
        </div>

        <!-- Result panel -->
        <div class="result-panel" id="resultPanel">

          <!-- Analyze -->
          <div class="panel-section">
            <div class="panel-label">분석</div>
            <button class="analyze-btn" id="analyzeBtn" disabled>이미지를 먼저 업로드하세요</button>
            <div class="loading" id="loadingEl">
              <div class="spin"></div>
              <span>AI가 이미지를 분석하는 중...</span>
            </div>
          </div>

          <!-- Tags -->
          <div class="panel-section" id="tagsSection" style="display:none">
            <div class="panel-label">태그 <span id="tagCountBadge" style="font-weight:400;text-transform:none;letter-spacing:0"></span></div>
            <div class="tags-wrap" id="tagsWrap"></div>
          </div>

          <!-- Note -->
          <div class="panel-section" id="noteSection" style="display:none">
            <div class="panel-label">노트</div>
            <textarea class="note-ta" id="noteTa" placeholder="AI 생성 노트 — 직접 수정 가능"></textarea>
            <div class="auth-row">
              <input class="auth-input" id="authInput" placeholder="#auth/ 출처 · 작가명" />
            </div>
          </div>

          <!-- Output -->
          <div class="panel-section" id="outputSection" style="display:none">
            <div class="panel-label">출력</div>
            <div class="output-box" id="outputBox"></div>
            <div class="row-btns">
              <button class="btn-sm" id="copyBtn">복사</button>
              <button class="btn-sm" id="refreshOutput">새로고침</button>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Settings View -->
    <div class="view" id="view-settings">
      <div class="settings-wrap">

        <!-- API Key -->
        <div class="settings-section">
          <div class="settings-title">Anthropic API 키</div>
          <div class="notice">키는 브라우저 로컬스토리지에만 저장됩니다. 파일을 공유해도 키는 포함되지 않아요.</div>
          <div class="api-key-row">
            <input class="api-key-input" type="password" id="apiKeyInput" placeholder="sk-ant-..." />
            <button class="btn-primary" id="saveApiBtn">저장</button>
          </div>
        </div>

        <!-- Tag Editor -->
        <div class="settings-section">
          <div class="settings-title">태그 라이브러리 편집</div>
          <div class="notice">변경사항은 즉시 저장됩니다. 카테고리 키(#typ, #fld 등)는 편집 불가 — 삭제 후 새로 추가하세요.</div>
          <div id="tagEditorWrap"></div>

          <div style="margin-top: 16px;">
            <div class="settings-title" style="margin-top:0;font-size:12px;">새 카테고리 추가</div>
            <div class="add-cat-row">
              <input class="mini-input" style="width:90px" id="newCatKey" placeholder="key (예: col)" />
              <input class="mini-input" style="width:160px" id="newCatLabel" placeholder="카테고리 이름" />
              <button class="btn-mini" id="addCatBtn">+ 추가</button>
            </div>
          </div>
        </div>

        <!-- Reset -->
        <div class="settings-section">
          <div class="settings-title">초기화</div>
          <button class="btn-sm" id="resetTagsBtn" style="max-width:200px">기본 태그로 초기화</button>
        </div>

      </div>
    </div>

  </main>
</div>

<script>
// ─── DEFAULT TAG LIBRARY ───────────────────────────────────────────────
const DEFAULT_TAGS = {
  typ: {
    label: "이미지 유형",
    tags: ["#typ/photo","#typ/render","#typ/drawing","#typ/diagram","#typ/collage","#typ/text"]
  },
  fld: {
    label: "분야",
    tags: ["#fld/arch","#fld/int","#fld/lands","#fld/branding","#fld/prod","#fld/art"]
  },
  atm: {
    label: "분위기",
    tags: ["#atm/minimal","#atm/zen","#atm/wabi","#atm/sensory","#atm/raw","#atm/warm","#atm/dark","#atm/traditional"]
  },
  mat: {
    label: "재료",
    tags: ["#mat/conc","#mat/timber","#mat/stone","#mat/brick","#mat/metal","#mat/plaster","#mat/ceramic","#mat/glass","#mat/textile","#mat/plant"]
  },
  ele: {
    label: "공간 요소",
    tags: ["#ele/light","#ele/shadow","#ele/detail","#ele/texture","#ele/color","#ele/water","#ele/path","#ele/threshold"]
  },
  sta: {
    label: "작업 상태",
    tags: ["#sta/ing","#sta/hold","#sta/end"]
  }
};

// ─── STATE ────────────────────────────────────────────────────────────
let tagLibrary = {};
let selectedTags = new Set();
let currentBase64 = null;
let currentMimeType = "image/jpeg";
let currentFileName = "";

// ─── STORAGE ─────────────────────────────────────────────────────────
function loadStorage() {
  try {
    const stored = localStorage.getItem("ref_tags");
    tagLibrary = stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(DEFAULT_TAGS));
  } catch { tagLibrary = JSON.parse(JSON.stringify(DEFAULT_TAGS)); }
}

function saveTags() {
  localStorage.setItem("ref_tags", JSON.stringify(tagLibrary));
}

function getApiKey() { return localStorage.getItem("ref_api_key") || ""; }

function saveApiKey(k) {
  localStorage.setItem("ref_api_key", k);
  updateApiStatus();
}

function updateApiStatus() {
  const key = getApiKey();
  const dot = document.getElementById("apiDot");
  const txt = document.getElementById("apiStatusText");
  if (key) {
    dot.className = "api-dot ok";
    txt.textContent = "API 연결됨";
  } else {
    dot.className = "api-dot err";
    txt.textContent = "API 키 필요";
  }
}

// ─── NAVIGATION ──────────────────────────────────────────────────────
document.querySelectorAll(".nav-item").forEach(btn => {
  btn.addEventListener("click", () => {
    const view = btn.dataset.view;
    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.getElementById("view-" + view).classList.add("active");
    if (view === "settings") renderTagEditor();
  });
});

// ─── FILE HANDLING ────────────────────────────────────────────────────
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");

dropArea.addEventListener("dragover", e => { e.preventDefault(); dropArea.classList.add("drag-over"); });
dropArea.addEventListener("dragleave", () => dropArea.classList.remove("drag-over"));
dropArea.addEventListener("drop", e => { e.preventDefault(); dropArea.classList.remove("drag-over"); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener("change", e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

document.getElementById("changeImgBtn").addEventListener("click", () => {
  document.getElementById("imagePreview").style.display = "none";
  dropArea.style.display = "flex";
  fileInput.value = "";
  currentBase64 = null;
  resetResults();
});

function handleFile(file) {
  currentFileName = file.name;
  currentMimeType = file.type || "image/jpeg";
  const reader = new FileReader();
  reader.onload = e => {
    currentBase64 = e.target.result.split(",")[1];
    document.getElementById("previewImg").src = e.target.result;
    document.getElementById("imgMetaText").textContent = file.name + " · " + (file.size / 1024).toFixed(0) + " KB";
    dropArea.style.display = "none";
    document.getElementById("imagePreview").style.display = "flex";
    resetResults();
    const btn = document.getElementById("analyzeBtn");
    btn.disabled = false;
    btn.textContent = "AI 태그 분석 →";
  };
  reader.readAsDataURL(file);
}

function resetResults() {
  selectedTags.clear();
  ["tagsSection","noteSection","outputSection"].forEach(id => {
    document.getElementById(id).style.display = "none";
  });
  document.getElementById("tagsWrap").innerHTML = "";
  document.getElementById("noteTa").value = "";
  document.getElementById("authInput").value = "";
  document.getElementById("outputBox").textContent = "";
}

// ─── ANALYSIS ─────────────────────────────────────────────────────────
document.getElementById("analyzeBtn").addEventListener("click", analyze);

async function analyze() {
  if (!currentBase64) return;
  const apiKey = getApiKey();
  if (!apiKey) {
    alert("설정에서 API 키를 먼저 입력해주세요.");
    return;
  }

  const btn = document.getElementById("analyzeBtn");
  const loading = document.getElementById("loadingEl");
  btn.style.display = "none";
  loading.style.display = "flex";

  const allTagsList = Object.values(tagLibrary).flatMap(g => g.tags);
  const tagStr = allTagsList.join(", ");

  const prompt = `You are a professional design archivist tagging a reference image for an architect/interior/landscape designer's personal library.

RULES:
- Select exactly 5 to 10 tags from the provided list ONLY. Do not invent new tags.
- Write a concise note in Korean (2–4 sentences) capturing design atmosphere, key materials, spatial qualities, or notable references.
- Return ONLY valid JSON, no markdown, no explanation.

TAG LIST: ${tagStr}

JSON FORMAT:
{"tags":["#tag/one","#tag/two"],"note":"한국어 노트 2-4문장."}`;

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Api-Key": apiKey
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: currentMimeType, data: currentBase64 } },
            { type: "text", text: prompt }
          ]
        }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || "API 오류");
    }

    const data = await res.json();
    const text = data.content.map(i => i.text || "").join("");
    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);

    loading.style.display = "none";

    parsed.tags.forEach(t => selectedTags.add(t));
    renderTags();

    document.getElementById("noteTa").value = parsed.note || "";

    document.getElementById("tagsSection").style.display = "block";
    document.getElementById("noteSection").style.display = "block";
    document.getElementById("outputSection").style.display = "block";

    generateOutput();
    btn.style.display = "block";
    btn.textContent = "다시 분석";

  } catch (err) {
    loading.style.display = "none";
    btn.style.display = "block";
    console.error("Full error:", err);
    btn.textContent = "오류: " + err.message.slice(0, 60) + " — 다시 시도";
  }
}

// ─── RENDER TAGS ──────────────────────────────────────────────────────
function renderTags() {
  const wrap = document.getElementById("tagsWrap");
  wrap.innerHTML = "";

  for (const [key, group] of Object.entries(tagLibrary)) {
    const groupEl = document.createElement("div");

    const lbl = document.createElement("div");
    lbl.className = "tag-group-label";
    lbl.textContent = group.label;
    groupEl.appendChild(lbl);

    const chips = document.createElement("div");
    chips.className = "tag-chips";

    for (const tag of group.tags) {
      const btn = document.createElement("button");
      btn.className = "chip" + (selectedTags.has(tag) ? " sel-" + key : "");
      btn.textContent = tag;
      btn.addEventListener("click", () => {
        if (selectedTags.has(tag)) { selectedTags.delete(tag); btn.className = "chip"; }
        else { selectedTags.add(tag); btn.className = "chip sel-" + key; }
        updateTagCount();
        generateOutput();
      });
      chips.appendChild(btn);
    }

    groupEl.appendChild(chips);
    wrap.appendChild(groupEl);
  }
  updateTagCount();
}

function updateTagCount() {
  document.getElementById("tagCountBadge").textContent = selectedTags.size + "개 선택";
}

// ─── OUTPUT ───────────────────────────────────────────────────────────
function generateOutput() {
  const tags = Array.from(selectedTags).join("  ");
  const auth = document.getElementById("authInput").value.trim();
  const note = document.getElementById("noteTa").value.trim();
  const date = new Date().toISOString().split("T")[0];
  let out = tags;
  if (auth) out += "  " + auth;
  out += "\n" + date;
  if (note) out += "\n\n" + note;
  document.getElementById("outputBox").textContent = out;
}

document.getElementById("noteTa").addEventListener("input", generateOutput);
document.getElementById("authInput").addEventListener("input", generateOutput);
document.getElementById("refreshOutput").addEventListener("click", generateOutput);

document.getElementById("copyBtn").addEventListener("click", () => {
  const text = document.getElementById("outputBox").textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("copyBtn");
    btn.textContent = "복사됨 ✓";
    setTimeout(() => { btn.textContent = "복사"; }, 1800);
  });
});

// ─── SETTINGS / API KEY ───────────────────────────────────────────────
document.getElementById("apiKeyInput").addEventListener("focus", function() {
  const k = getApiKey();
  if (k) this.value = k;
});

document.getElementById("saveApiBtn").addEventListener("click", () => {
  const k = document.getElementById("apiKeyInput").value.trim();
  if (!k) return;
  saveApiKey(k);
  document.getElementById("apiKeyInput").value = "";
  document.getElementById("apiKeyInput").placeholder = "저장됨 ✓";
  setTimeout(() => { document.getElementById("apiKeyInput").placeholder = "sk-ant-..."; }, 2000);
});

// ─── TAG EDITOR ───────────────────────────────────────────────────────
function renderTagEditor() {
  const wrap = document.getElementById("tagEditorWrap");
  wrap.innerHTML = "";

  for (const [key, group] of Object.entries(tagLibrary)) {
    const block = document.createElement("div");
    block.className = "category-block";

    // Header
    const header = document.createElement("div");
    header.className = "category-header";

    const keyBadge = document.createElement("span");
    keyBadge.className = "cat-key";
    keyBadge.textContent = "#" + key + "/";

    const labelInput = document.createElement("input");
    labelInput.className = "cat-label-input";
    labelInput.value = group.label;
    labelInput.addEventListener("change", () => {
      tagLibrary[key].label = labelInput.value;
      saveTags();
    });

    const delBtn = document.createElement("button");
    delBtn.className = "del-cat-btn";
    delBtn.textContent = "×";
    delBtn.title = "카테고리 삭제";
    delBtn.addEventListener("click", () => {
      if (confirm(`"#${key}/" 카테고리를 삭제할까요? 태그 ${group.tags.length}개가 함께 삭제됩니다.`)) {
        delete tagLibrary[key];
        saveTags();
        renderTagEditor();
      }
    });

    header.appendChild(keyBadge);
    header.appendChild(labelInput);
    header.appendChild(delBtn);
    block.appendChild(header);

    // Tags
    const tagsEl = document.createElement("div");
    tagsEl.className = "category-tags";

    function renderPills() {
      tagsEl.innerHTML = "";
      for (const tag of tagLibrary[key].tags) {
        const pill = document.createElement("span");
        pill.className = "tag-pill";
        pill.textContent = tag + " ";
        const del = document.createElement("button");
        del.className = "del-tag";
        del.textContent = "×";
        del.addEventListener("click", () => {
          tagLibrary[key].tags = tagLibrary[key].tags.filter(t => t !== tag);
          saveTags();
          renderPills();
        });
        pill.appendChild(del);
        tagsEl.appendChild(pill);
      }

      // Add tag row
      const addRow = document.createElement("div");
      addRow.className = "add-tag-mini";
      const inp = document.createElement("input");
      inp.className = "mini-input";
      inp.placeholder = "/" + key.slice(0,3) + "/새태그명";
      const hint = document.createElement("span");
      hint.className = "mini-hint";
      hint.textContent = "← Enter";
      const addBtn = document.createElement("button");
      addBtn.className = "btn-mini";
      addBtn.textContent = "+ 추가";

      function addTag() {
        let v = inp.value.trim();
        if (!v) return;
        if (!v.startsWith("#")) v = "#" + key + "/" + v;
        if (!tagLibrary[key].tags.includes(v)) {
          tagLibrary[key].tags.push(v);
          saveTags();
          renderPills();
        }
        inp.value = "";
      }

      inp.addEventListener("keydown", e => { if (e.key === "Enter") addTag(); });
      addBtn.addEventListener("click", addTag);
      addRow.appendChild(inp);
      addRow.appendChild(hint);
      addRow.appendChild(addBtn);
      tagsEl.appendChild(addRow);
    }

    renderPills();
    block.appendChild(tagsEl);
    wrap.appendChild(block);
  }
}

// ─── ADD CATEGORY ─────────────────────────────────────────────────────
document.getElementById("addCatBtn").addEventListener("click", () => {
  const key = document.getElementById("newCatKey").value.trim().replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
  const label = document.getElementById("newCatLabel").value.trim();
  if (!key || !label) { alert("키와 이름을 모두 입력해주세요."); return; }
  if (tagLibrary[key]) { alert("이미 있는 키예요."); return; }
  tagLibrary[key] = { label, tags: [] };
  saveTags();
  document.getElementById("newCatKey").value = "";
  document.getElementById("newCatLabel").value = "";
  renderTagEditor();
});

// ─── RESET TAGS ───────────────────────────────────────────────────────
document.getElementById("resetTagsBtn").addEventListener("click", () => {
  if (confirm("태그를 기본값으로 초기화할까요? 추가한 태그가 모두 삭제돼요.")) {
    tagLibrary = JSON.parse(JSON.stringify(DEFAULT_TAGS));
    saveTags();
    renderTagEditor();
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────
loadStorage();
updateApiStatus();
</script>
</body>
</html>
